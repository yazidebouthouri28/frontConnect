<div class="min-h-screen bg-[#fcfdfc] py-12 px-6">
    <div class="max-w-2xl mx-auto">
        <!-- Back Navigation -->
        <button (click)="goBack()"
            class="group mb-8 flex items-center gap-3 text-forest hover:text-olive transition-all duration-300">
            <div
                class="w-10 h-10 bg-white rounded-xl shadow-sm border border-sage/10 flex items-center justify-center group-hover:scale-105 transition-transform">
                <i class="fas fa-arrow-left text-sm"></i>
            </div>
            <div class="flex flex-col items-start leading-none">
                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-wider mb-0.5">Navigation</span>
                <span class="text-sm font-bold tracking-tight">Return to Services</span>
            </div>
        </button>

        <div class="bg-white rounded-2xl p-6 md:p-8 shadow-lg border border-sage/10 relative overflow-hidden">
            <!-- Decorative Shape -->
            <div class="absolute -right-20 -top-20 w-64 h-64 bg-olive/5 rounded-full blur-3xl"></div>

            <div class="relative mb-8">
                <h2 class="text-2xl font-black text-forest tracking-tight mb-1">Service <span
                        class="text-olive">Configuration</span></h2>
                <p class="text-xs text-gray-500 font-medium">Define parameters for the new camping amenity.</p>
                <div class="absolute -left-6 top-0 bottom-0 w-1 bg-olive/30 rounded-full"></div>
            </div>

            <div *ngIf="errorMessage"
                class="bg-red-50 text-red-600 p-3 rounded-lg mb-6 font-medium text-xs border border-red-100 flex items-center gap-3 slide-in-from-top">
                <i class="fas fa-exclamation-circle"></i>
                {{ errorMessage }}
            </div>

            <form [formGroup]="serviceForm" (ngSubmit)="onSubmit()" class="space-y-5 relative z-10">
                <!-- Name -->
                <div class="space-y-1.5">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-forest ml-2">Service
                        Designation *</label>
                    <input type="text" formControlName="name" placeholder="e.g., Sahara Stargazing Tour"
                        class="w-full bg-cream/30 border border-sage/20 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-olive/20 focus:border-olive transition-all text-sm font-medium text-forest placeholder:text-gray-400 outline-none"
                        [ngClass]="{'border-red-400': submitted && serviceForm.get('name')?.invalid}">
                    <div *ngIf="submitted && serviceForm.get('name')?.invalid"
                        class="text-red-500 text-[10px] mt-1 font-medium ml-2">
                        Designation is required (min 3 characters).
                    </div>
                </div>

                <!-- Type Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-forest ml-2">Operational
                            Category *</label>
                        <div class="relative">
                            <select formControlName="type"
                                class="w-full bg-cream/30 border border-sage/20 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-olive/20 focus:border-olive transition-all text-sm font-medium text-forest appearance-none cursor-pointer outline-none"
                                [ngClass]="{'border-red-400': submitted && serviceForm.get('type')?.invalid}">
                                <option value="" disabled>Select category</option>
                                <option *ngFor="let t of serviceTypes" [value]="t.value">{{ t.label }}</option>
                            </select>
                            <i
                                class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-olive text-[10px] pointer-events-none"></i>
                        </div>
                        <div *ngIf="submitted && serviceForm.get('type')?.invalid"
                            class="text-red-500 text-[10px] mt-1 font-medium ml-2">
                            Please assign a category.
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-forest ml-2">Target
                            Audience *</label>
                        <div class="relative">
                            <select formControlName="targetRole"
                                class="w-full bg-cream/30 border border-sage/20 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-olive/20 focus:border-olive transition-all text-sm font-medium text-forest appearance-none cursor-pointer outline-none"
                                [ngClass]="{'border-red-400': submitted && serviceForm.get('targetRole')?.invalid}">
                                <option value="USER">Standard Camper (User)</option>
                                <option value="ORGANIZER">Event Organizer (B2B)</option>
                            </select>
                            <i
                                class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-olive text-[10px] pointer-events-none"></i>
                        </div>
                    </div>
                </div>

                <!-- Price and Desc Grid -->
                <div class="grid grid-cols-1 gap-5">
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-forest ml-2">Base Tariff
                            (DT) *</label>
                        <div class="relative w-1/2">
                            <input type="number" formControlName="price" placeholder="0"
                                class="w-full bg-cream/30 border border-sage/20 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-olive/20 focus:border-olive transition-all text-sm font-bold text-forest outline-none pr-10"
                                [ngClass]="{'border-red-400': submitted && serviceForm.get('price')?.invalid}">
                            <span
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs font-bold">DT</span>
                        </div>
                        <div *ngIf="submitted && serviceForm.get('price')?.invalid"
                            class="text-red-500 text-[10px] mt-1 font-medium ml-2">
                            Tariff must be valid.
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-forest ml-2">Service
                            Briefing *</label>
                        <textarea formControlName="description" rows="2"
                            placeholder="Detail the features, schedules, and inclusions..."
                            class="w-full bg-cream/30 border border-sage/20 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-olive/20 focus:border-olive transition-all text-sm font-medium text-forest outline-none resize-none"
                            [ngClass]="{'border-red-400': submitted && serviceForm.get('description')?.invalid}"></textarea>
                        <div *ngIf="submitted && serviceForm.get('description')?.invalid"
                            class="text-red-500 text-[10px] mt-1 font-medium ml-2">
                            Briefing is required.
                        </div>
                    </div>
                </div>

                <!-- Image Upload (Base64) -->
                <div class="space-y-1.5">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-forest ml-2">Service Cover
                        Image</label>
                    <div class="relative w-full h-32 border-2 border-dashed border-sage/40 rounded-xl bg-cream/20 flex flex-col items-center justify-center cursor-pointer hover:bg-cream/50 transition-colors group overflow-hidden"
                        (click)="fileInput.click()">

                        <!-- Hidden Input -->
                        <input type="file" #fileInput (change)="onFileSelected($event)"
                            accept="image/png, image/jpeg, image/webp" class="hidden">

                        <!-- Default State -->
                        <div *ngIf="!imagePreview" class="flex flex-col items-center">
                            <i
                                class="fas fa-cloud-upload-alt text-2xl text-olive/50 mb-2 group-hover:scale-110 transition-transform"></i>
                            <span class="text-xs font-bold text-forest">Click to upload an image</span>
                            <span class="text-[9px] text-gray-400 mt-1">PNG, JPG, WEBP (Max 2MB)</span>
                        </div>

                        <!-- Preview State -->
                        <div *ngIf="imagePreview" class="absolute inset-0 w-full h-full">
                            <img [src]="imagePreview" class="w-full h-full object-cover opacity-90">
                            <div
                                class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity">
                                <span
                                    class="text-white text-xs font-bold bg-black/50 px-3 py-1.5 rounded-md backdrop-blur-sm shadow-xl flex items-center gap-2">
                                    <i class="fas fa-sync-alt"></i> Change Image
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Availability Toggle -->
                <div class="flex items-center gap-3 bg-cream/10 p-3 rounded-lg border border-sage/10 mt-2">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" formControlName="available" class="sr-only peer">
                        <div
                            class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-success">
                        </div>
                    </label>
                    <span class="text-xs font-bold text-forest">Mark as Available for booking</span>
                </div>

                <!-- Actions -->
                <div class="pt-6">
                    <button type="submit" [disabled]="loading"
                        class="w-full h-12 bg-forest text-white rounded-lg font-bold text-sm tracking-wide shadow-md hover:shadow-lg hover:bg-black transition-all flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span *ngIf="loading"
                            class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                        <i *ngIf="!loading" class="fas fa-save opacity-80"></i>
                        {{ loading ? 'Processing...' : 'Commit Configuration' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
