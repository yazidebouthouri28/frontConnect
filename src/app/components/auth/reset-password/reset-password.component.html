<div class="reset-page">
  <div class="reset-container">
    <div class="reset-card">
      <div class="reset-header">
        <h1 class="reset-title">Create New Password</h1>
        <p class="reset-subtitle">Enter your new password below to secure your account.</p>
      </div>

      <div *ngIf="errorMessage" class="reset-alert reset-alert-error">
        <span>⚠️</span> {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="reset-alert reset-alert-success">
        <span>✅</span> {{ successMessage }}
      </div>

      <form *ngIf="!successMessage && token" (ngSubmit)="resetPassword()" class="reset-form">
        <div class="form-group">
          <label for="new-password" class="reset-label">New Password</label>
          <div class="password-wrapper">
            <input [type]="showPassword ? 'text' : 'password'" id="new-password" [(ngModel)]="newPassword"
              name="newPassword" class="reset-input" placeholder="Min. 6 characters" required />
            <button type="button" class="password-toggle" (click)="togglePassword()">
              <span *ngIf="!showPassword">👁️</span>
              <span *ngIf="showPassword">🙈</span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password" class="reset-label">Confirm Password</label>
          <div class="password-wrapper">
            <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirm-password"
              [(ngModel)]="confirmPassword" name="confirmPassword" class="reset-input"
              placeholder="Repeat your password" required />
            <button type="button" class="password-toggle" (click)="toggleConfirmPassword()">
              <span *ngIf="!showConfirmPassword">👁️</span>
              <span *ngIf="showConfirmPassword">🙈</span>
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="isLoading" class="reset-btn">
          {{ isLoading ? 'Updating password...' : 'Reset Password' }}
        </button>
      </form>

      <div *ngIf="!token" class="reset-footer">
        <p>This reset link is invalid or has expired.</p>
        <a routerLink="/auth" class="reset-link">Back to Login</a>
      </div>
    </div>
  </div>
</div>
