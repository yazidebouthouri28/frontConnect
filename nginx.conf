server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml;

    # Angular SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Spring Boot API (same-origin from the browser when apiUrl is '')
    location /api/ {
        proxy_pass http://connectcamp-backend:8089/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://connectcamp-backend:8089/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://connectcamp-backend:8089/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
